<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공지사항 – 중흥FC</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:  #1a7f3c; --green2: #23a852; --dark: #111827;
    --gray1: #374151; --gray2: #6b7280; --gray3: #d1d5db;
    --bg: #f4f6f8; --white: #ffffff;
    --card-shadow: 0 2px 16px rgba(0,0,0,.07); --radius: 14px;
  }
  body { font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; }

  nav { position:sticky;top:0;z-index:100;background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:60px;box-shadow:0 2px 12px rgba(0,0,0,.3); }
  .nav-logo { display:flex;align-items:center;gap:10px;font-size:20px;font-weight:900;color:#fff;text-decoration:none;cursor:pointer; }
  .nav-logo .badge { background:var(--green);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px; }
  .nav-links { display:flex;gap:28px;list-style:none; }
  .nav-links a { color:#9ca3af;font-size:14px;font-weight:500;text-decoration:none;transition:color .2s;cursor:pointer; }
  .nav-links a:hover,.nav-links a.active { color:#fff; }

  .page-header { background:linear-gradient(135deg,#0f2027 0%,#1a4a2e 60%,#203a43 100%);padding:40px 40px 36px; }
  .page-header-inner { max-width:900px;margin:0 auto; }
  .breadcrumb { font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;align-items:center;gap:6px; }
  .breadcrumb .cur { color:var(--green2);font-weight:600; }
  .page-header h1 { font-size:28px;font-weight:900;color:#fff; }
  .page-header p { font-size:14px;color:#9ca3af;margin-top:6px; }

  .main-wrap { max-width:900px;margin:0 auto;padding:36px 40px 60px; }

  .filter-bar { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap; }
  .category-tabs { display:flex;gap:6px; }
  .cat-btn { padding:6px 16px;border-radius:8px;border:1.5px solid var(--gray3);background:var(--white);font-size:13px;font-weight:600;color:var(--gray2);cursor:pointer;transition:all .2s;font-family:inherit; }
  .cat-btn.active { background:var(--green);color:#fff;border-color:var(--green); }
  .search-box { display:flex;align-items:center;gap:8px;background:var(--white);border:1.5px solid var(--gray3);border-radius:9px;padding:6px 14px; }
  .search-box input { border:none;outline:none;font-size:13px;font-family:inherit;color:var(--dark);width:180px;background:transparent; }
  .search-box input::placeholder { color:var(--gray2); }
  .write-btn { background:var(--green);color:#fff;border:none;border-radius:9px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:background .2s; }
  .write-btn:hover { background:#155f2e; }

  .notice-table { background:var(--white);border-radius:var(--radius);box-shadow:var(--card-shadow);overflow:hidden;margin-bottom:20px; }
  .notice-table-header { display:grid;grid-template-columns:60px 80px 1fr 90px 70px;padding:12px 24px;background:#f9fafb;border-bottom:1.5px solid #e5e7eb;font-size:12px;font-weight:700;color:var(--gray2);letter-spacing:.4px; }
  .notice-row { display:grid;grid-template-columns:60px 80px 1fr 90px 70px;padding:16px 24px;border-bottom:1px solid #f3f4f6;align-items:center;cursor:pointer;transition:background .15s; }
  .notice-row:last-child { border-bottom:none; }
  .notice-row:hover { background:#f9fafb; }
  .notice-row.pinned { background:#f0fdf4; }
  .notice-row.pinned:hover { background:#e7faf0; }
  .row-num { font-size:13px;color:var(--gray2);text-align:center; }
  .row-badge { display:flex;justify-content:center; }
  .n-badge { font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap; }
  .b-new   { background:#ecfdf5;color:var(--green);border:1px solid #a7f3d0; }
  .b-info  { background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe; }
  .b-event { background:#fff7ed;color:#ea580c;border:1px solid #fed7aa; }
  .row-title-wrap { display:flex;align-items:center;gap:8px; }
  .row-title { font-size:14px;font-weight:600;color:var(--dark); }
  .new-dot { font-size:10px;font-weight:800;color:#ef4444;background:#fee2e2;padding:1px 5px;border-radius:4px; }
  .row-author { font-size:13px;color:var(--gray2);text-align:center; }
  .row-date   { font-size:12px;color:var(--gray2);text-align:center; }

  .pagination { display:flex;justify-content:center;gap:6px;margin-top:20px; }
  .page-btn { width:36px;height:36px;border-radius:9px;border:1.5px solid var(--gray3);background:var(--white);font-size:13px;font-weight:600;color:var(--gray2);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-family:inherit; }
  .page-btn:hover { border-color:var(--green);color:var(--green); }
  .page-btn.active { background:var(--green);color:#fff;border-color:var(--green); }

  #view-detail { display:none; }
  .detail-header { background:var(--white);border-radius:var(--radius);box-shadow:var(--card-shadow);padding:28px 32px;margin-bottom:16px; }
  .detail-category { margin-bottom:12px; }
  .detail-title { font-size:22px;font-weight:800;margin-bottom:16px;line-height:1.4; }
  .detail-meta { display:flex;gap:20px;font-size:13px;color:var(--gray2);padding-top:16px;border-top:1px solid #e5e7eb; }
  .detail-body { background:var(--white);border-radius:var(--radius);box-shadow:var(--card-shadow);padding:32px;font-size:15px;line-height:1.9;color:var(--gray1);margin-bottom:16px;min-height:200px; }
  .detail-nav { background:var(--white);border-radius:var(--radius);box-shadow:var(--card-shadow);overflow:hidden;margin-bottom:20px; }
  .detail-nav-row { display:flex;align-items:center;gap:16px;padding:14px 24px;border-bottom:1px solid #f3f4f6;font-size:13px;cursor:pointer;transition:background .15s; }
  .detail-nav-row:last-child { border-bottom:none; }
  .detail-nav-row:hover { background:#f9fafb; }
  .nav-label { font-weight:700;color:var(--gray2);width:40px;flex-shrink:0; }
  .btn-back { padding:10px 22px;border-radius:9px;border:1.5px solid var(--gray3);background:var(--white);font-size:14px;font-weight:600;color:var(--gray2);cursor:pointer;transition:all .2s;font-family:inherit; }
  .btn-back:hover { border-color:var(--green);color:var(--green); }
  .detail-actions { display:flex;justify-content:space-between;align-items:center; }
  .detail-edit-btns { display:flex;gap:8px; }
  .btn-edit { padding:9px 18px;border-radius:8px;border:1.5px solid #e5e7eb;background:var(--white);font-size:13px;font-weight:600;color:var(--gray2);cursor:pointer;font-family:inherit;transition:all .2s; }
  .btn-edit:hover { border-color:var(--gray1);color:var(--gray1); }
  .btn-delete { padding:9px 18px;border-radius:8px;border:1.5px solid #fee2e2;background:#fff5f5;font-size:13px;font-weight:600;color:#dc2626;cursor:pointer;font-family:inherit;transition:all .2s; }
  .btn-delete:hover { background:#fee2e2; }

  #view-write { display:none; }
  .write-form { background:var(--white);border-radius:var(--radius);box-shadow:var(--card-shadow);padding:32px; }
  .form-group { margin-bottom:20px; }
  .form-label { font-size:13px;font-weight:700;color:var(--gray1);margin-bottom:8px;display:block; }
  .form-required { color:#ef4444;margin-left:2px; }
  .form-input,.form-select,.form-textarea { width:100%;padding:11px 16px;border:1.5px solid var(--gray3);border-radius:9px;font-size:14px;font-family:inherit;color:var(--dark);transition:border-color .2s;background:var(--white);outline:none; }
  .form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--green);box-shadow:0 0 0 3px rgba(26,127,60,.1); }
  .form-textarea { min-height:260px;resize:vertical;line-height:1.7; }
  .form-row { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
  .write-actions { display:flex;justify-content:flex-end;gap:10px;margin-top:24px; }
  .btn-submit { padding:11px 28px;border-radius:9px;background:var(--green);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s; }
  .btn-submit:hover { background:#155f2e; }
  .btn-cancel { padding:11px 24px;border-radius:9px;border:1.5px solid var(--gray3);background:var(--white);font-size:14px;font-weight:600;color:var(--gray2);cursor:pointer;font-family:inherit;transition:all .2s; }
  .btn-cancel:hover { border-color:var(--gray1);color:var(--gray1); }
  .char-count { font-size:12px;color:var(--gray2);text-align:right;margin-top:4px; }

  .toast { position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3); }
  .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

  .empty-state { text-align:center;padding:60px 20px;color:var(--gray2);font-size:15px; }
  .empty-icon { font-size:48px;margin-bottom:16px; }

  footer { background:var(--dark);color:#6b7280;padding:28px 40px;font-size:13px;display:flex;align-items:center;justify-content:space-between; }
  footer .footer-logo { font-size:17px;font-weight:900;color:#fff;margin-bottom:4px; }

  @media(max-width:640px){
    .main-wrap{padding:24px 16px 48px;} .page-header{padding:28px 20px;} nav{padding:0 16px;}
    .notice-table-header,.notice-row{grid-template-columns:44px 68px 1fr 68px;}
    .notice-table-header>:last-child,.notice-row>:last-child{display:none;}
    .form-row{grid-template-columns:1fr;} .filter-bar{flex-direction:column;align-items:flex-start;}
    footer{flex-direction:column;gap:12px;}
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="goHome()">⚽ 중흥FC <span class="badge">조기축구</span></div>
  <ul class="nav-links">
    <li><a class="active">공지사항</a></li>
    <li><a onclick="goHome()">경기일정</a></li>
    <li><a onclick="goHome()">회원명단</a></li>
    <li><a onclick="goHome()">갤러리</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb">
      <span onclick="goHome()" style="cursor:pointer;">홈</span>
      <span>›</span>
      <span class="cur">공지사항</span>
    </div>
    <h1>📢 공지사항</h1>
    <p>중흥FC의 소식과 일정을 확인하세요.</p>
  </div>
</div>

<div class="main-wrap">

  <!-- LIST -->
  <div id="view-list">
    <div class="filter-bar">
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
        <div class="category-tabs">
          <button class="cat-btn active" onclick="filterCat('전체',this)">전체</button>
          <button class="cat-btn" onclick="filterCat('NEW',this)">NEW</button>
          <button class="cat-btn" onclick="filterCat('안내',this)">안내</button>
          <button class="cat-btn" onclick="filterCat('이벤트',this)">이벤트</button>
        </div>
        <div class="search-box">
          <span>🔍</span>
          <input type="text" id="search-input" placeholder="제목 검색..." oninput="onSearch()">
        </div>
      </div>
      <button class="write-btn" onclick="showWrite()">✏️ 글쓰기</button>
    </div>

    <div class="notice-table">
      <div class="notice-table-header">
        <div style="text-align:center;">번호</div>
        <div style="text-align:center;">분류</div>
        <div>제목</div>
        <div style="text-align:center;">작성자</div>
        <div style="text-align:center;">날짜</div>
      </div>
      <div id="notice-body"></div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- DETAIL -->
  <div id="view-detail">
    <div class="detail-header">
      <div class="detail-category" id="d-category"></div>
      <div class="detail-title" id="d-title"></div>
      <div class="detail-meta">
        <span>✍️ <span id="d-author"></span></span>
        <span>📅 <span id="d-date"></span></span>
        <span>👁 <span id="d-views"></span>회</span>
      </div>
    </div>
    <div class="detail-body" id="d-body"></div>
    <div class="detail-nav" id="d-nav"></div>
    <div class="detail-actions">
      <button class="btn-back" onclick="showList()">← 목록으로</button>
      <div class="detail-edit-btns">
        <button class="btn-edit" onclick="editPost()">✏️ 수정</button>
        <button class="btn-delete" onclick="deletePost()">🗑 삭제</button>
      </div>
    </div>
  </div>

  <!-- WRITE -->
  <div id="view-write">
    <div class="write-form">
      <h2 style="font-size:18px;font-weight:800;margin-bottom:24px;" id="form-title">글쓰기</h2>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">분류<span class="form-required">*</span></label>
          <select class="form-select" id="f-category">
            <option value="안내">안내</option>
            <option value="NEW">NEW</option>
            <option value="이벤트">이벤트</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">작성자<span class="form-required">*</span></label>
          <input class="form-input" id="f-author" type="text" placeholder="이름을 입력하세요">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">제목<span class="form-required">*</span></label>
        <input class="form-input" id="f-title" type="text" placeholder="제목을 입력하세요" maxlength="100" oninput="updateCharCount()">
        <div class="char-count"><span id="char-count">0</span>/100</div>
      </div>
      <div class="form-group">
        <label class="form-label">내용<span class="form-required">*</span></label>
        <textarea class="form-textarea" id="f-body" placeholder="내용을 입력하세요..."></textarea>
      </div>
      <div class="write-actions">
        <button class="btn-cancel" onclick="showList()">취소</button>
        <button class="btn-submit" onclick="submitPost()">등록하기</button>
      </div>
    </div>
  </div>

</div>

<footer>
  <div>
    <div class="footer-logo">⚽ 중흥FC</div>
    <div>광주광역시 북구 일곡동 | 매주 화·목 AM 6:00</div>
  </div>
  <div>© 2026 중흥FC. All rights reserved.</div>
</footer>

<div class="toast" id="toast"></div>

<script>
let posts = [
  { id:7, cat:'NEW', title:'7월 정기 친선경기 일정 안내 – 상무동FC 초청전', author:'운영진', date:'2026.06.20', views:42, pinned:false,
    body:'안녕하세요, 중흥FC 회원 여러분!\n\n7월 정기 친선경기 일정을 아래와 같이 안내드립니다.\n\n📅 일시: 2026년 7월 5일 (토) AM 07:00 킥오프\n📍 장소: 일곡 생활체육공원 천연잔디구장\n🆚 상대팀: 상무동FC\n\n▶ 집결 시간: AM 06:30 (늦지 않게 참석 부탁드립니다)\n▶ 준비물: 유니폼, 축구화, 개인 물병\n▶ 참가비: 별도 없음\n\n경기 후 뒤풀이 자리도 마련할 예정이니 많은 참여 부탁드립니다.\n참석 가능 여부는 카카오톡 단체방에 댓글 달아주세요! 🙏' },
  { id:6, cat:'이벤트', title:'2026 하반기 회비 납부 안내 (7월 1일~15일)', author:'총무 박성우', date:'2026.06.18', views:87, pinned:false,
    body:'2026년 하반기 회비 납부 안내입니다.\n\n💰 납부 기간: 2026년 7월 1일 ~ 7월 15일\n💳 납부 금액: 월 10,000원 × 6개월 = 60,000원 (일시납)\n🏦 계좌번호: 국민은행 123-456-789012 (예금주: 중흥FC)\n\n납부 시 반드시 본인 이름을 입금자명에 기재해 주세요.\n기간 내 미납 시 다음 시즌 경기 출전에 제한이 있을 수 있습니다.\n\n문의 사항은 총무 박성우(010-XXXX-XXXX)에게 연락 주세요. 감사합니다!' },
  { id:5, cat:'안내', title:'6월 22일(월) 우천으로 인한 훈련 취소 공지', author:'운영진', date:'2026.06.15', views:63, pinned:false,
    body:'회원 여러분께 안내드립니다.\n\n기상 예보에 따르면 6월 22일(월) 오전 광주 지역에 강한 비가 예보되어 있어, 부득이하게 당일 훈련을 취소합니다.\n\n🚫 훈련 취소: 2026년 6월 22일 (월) AM 06:00\n📅 다음 훈련: 2026년 6월 25일 (목) AM 06:00 예정\n\n기상 상황에 따라 추가 변경이 있을 경우 카카오톡 단체방으로 공지 드리겠습니다.\n건강 유의하시고 안전한 하루 되세요!' },
  { id:4, cat:'안내', title:'신입 회원 모집 안내 – 누구나 환영합니다 🙌', author:'운영진', date:'2026.06.10', views:128, pinned:true,
    body:'중흥FC에서 새로운 가족을 모집합니다!\n\n⚽ 중흥FC는 광주 북구를 기반으로 활동하는 조기축구회로, 열정 있는 분이라면 누구든 환영합니다.\n\n📌 활동 정보\n• 정기 훈련: 매주 화요일, 목요일 AM 06:00~07:30\n• 장소: 일곡 생활체육공원\n• 월 회비: 10,000원\n\n📌 자격 요건\n• 성별·나이·실력 제한 없음 (단, 18세 이상)\n• 기본 체력을 갖추신 분\n• 팀워크와 매너를 중요시하는 분\n\n📌 가입 방법\n아래 연락처로 문자 또는 카카오톡 메시지를 보내주세요.\n📞 010-XXXX-XXXX (운영진)\n\n많은 관심 부탁드립니다! 함께 뛰어요 🏃' },

let nextId=8, currentFilter='전체', currentSearch='', currentPage=1, editingId=null, currentDetailId=null;
const PAGE_SIZE=7;

function badgeClass(cat){ return cat==='NEW'?'b-new':cat==='이벤트'?'b-event':'b-info'; }

function getFiltered(){
  return posts.filter(p=>{
    const catOk=currentFilter==='전체'||p.cat===currentFilter;
    const searchOk=!currentSearch||p.title.includes(currentSearch);
    return catOk&&searchOk;
  });
}

function renderList(){
  const filtered=getFiltered();
  const pinned=filtered.filter(p=>p.pinned);
  const normal=filtered.filter(p=>!p.pinned).sort((a,b)=>b.id-a.id);
  const totalPages=Math.max(1,Math.ceil(normal.length/PAGE_SIZE));
  if(currentPage>totalPages) currentPage=1;
  const paged=[...pinned,...normal.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE)];

  const body=document.getElementById('notice-body');
  if(paged.length===0){
    body.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div>등록된 공지사항이 없습니다.</div>';
  } else {
    let num=normal.length;
    body.innerHTML=paged.map(p=>{
      const isNew=p.date>='2026.06.01';
      const rowNum=p.pinned?'<span style="font-size:14px;">📌</span>':(num--);
      return `<div class="notice-row${p.pinned?' pinned':''}" onclick="showDetail(${p.id})">
        <div class="row-num">${rowNum}</div>
        <div class="row-badge"><span class="n-badge ${badgeClass(p.cat)}">${p.cat}</span></div>
        <div class="row-title-wrap">
          <span class="row-title">${p.title}</span>
          ${isNew&&!p.pinned?'<span class="new-dot">N</span>':''}
        </div>
        <div class="row-author">${p.author}</div>
        <div class="row-date">${p.date}</div>
      </div>`;
    }).join('');
  }

  const pg=document.getElementById('pagination');
  if(totalPages<=1){pg.innerHTML='';return;}
  let html=`<button class="page-btn" onclick="gotoPage(${Math.max(1,currentPage-1)})">‹</button>`;
  for(let i=1;i<=totalPages;i++) html+=`<button class="page-btn${i===currentPage?' active':''}" onclick="gotoPage(${i})">${i}</button>`;
  html+=`<button class="page-btn" onclick="gotoPage(${Math.min(totalPages,currentPage+1)})">›</button>`;
  pg.innerHTML=html;
}

function gotoPage(n){currentPage=n;renderList();}
function filterCat(cat,btn){
  currentFilter=cat;currentPage=1;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}
function onSearch(){currentSearch=document.getElementById('search-input').value.trim();currentPage=1;renderList();}

function showDetail(id){
  const p=posts.find(x=>x.id===id); if(!p) return;
  p.views++; currentDetailId=id;
  document.getElementById('d-category').innerHTML=`<span class="n-badge ${badgeClass(p.cat)}">${p.cat}</span>`;
  document.getElementById('d-title').textContent=p.title;
  document.getElementById('d-author').textContent=p.author;
  document.getElementById('d-date').textContent=p.date;
  document.getElementById('d-views').textContent=p.views;
  document.getElementById('d-body').innerHTML=p.body.replace(/\n/g,'<br>');
  const sorted=[...posts].sort((a,b)=>b.id-a.id);
  const idx=sorted.findIndex(x=>x.id===id);
  const prev=sorted[idx-1],next=sorted[idx+1];
  let nav='';
  if(prev) nav+=`<div class="detail-nav-row" onclick="showDetail(${prev.id})"><span class="nav-label">이전</span><span>${prev.title}</span></div>`;
  if(next) nav+=`<div class="detail-nav-row" onclick="showDetail(${next.id})"><span class="nav-label">다음</span><span>${next.title}</span></div>`;
  document.getElementById('d-nav').innerHTML=nav||'<div style="padding:14px 24px;font-size:13px;color:#9ca3af;">이전/다음 글이 없습니다.</div>';
  switchView('detail');
}

function showList(){switchView('list');renderList();}
function showWrite(isEdit=false){
  document.getElementById('form-title').textContent=isEdit?'글 수정':'글쓰기';
  if(!isEdit){
    editingId=null;
    document.getElementById('f-title').value='';
    document.getElementById('f-body').value='';
    document.getElementById('f-author').value='';
    document.getElementById('f-category').value='안내';
    document.getElementById('char-count').textContent='0';
  }
  switchView('write');
}
function editPost(){
  const p=posts.find(x=>x.id===currentDetailId); if(!p) return;
  editingId=p.id;
  document.getElementById('form-title').textContent='글 수정';
  document.getElementById('f-category').value=p.cat;
  document.getElementById('f-author').value=p.author;
  document.getElementById('f-title').value=p.title;
  document.getElementById('f-body').value=p.body;
  document.getElementById('char-count').textContent=p.title.length;
  switchView('write');
}
function deletePost(){
  if(!confirm('정말 삭제하시겠습니까?')) return;
  posts=posts.filter(p=>p.id!==currentDetailId);
  showToast('✅ 삭제되었습니다.');
  showList();
}
function submitPost(){
  const title=document.getElementById('f-title').value.trim();
  const body=document.getElementById('f-body').value.trim();
  const author=document.getElementById('f-author').value.trim();
  const cat=document.getElementById('f-category').value;
  if(!title){showToast('⚠️ 제목을 입력해 주세요.');return;}
  if(!author){showToast('⚠️ 작성자를 입력해 주세요.');return;}
  if(!body){showToast('⚠️ 내용을 입력해 주세요.');return;}
  const today=new Date();
  const dateStr=`${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  if(editingId){
    const p=posts.find(x=>x.id===editingId);
    if(p){p.title=title;p.body=body;p.author=author;p.cat=cat;p.date=dateStr;}
    showToast('✅ 수정되었습니다.');
    showDetail(editingId);
  } else {
    posts.unshift({id:nextId++,cat,title,author,date:dateStr,views:0,pinned:false,body});
    showToast('✅ 등록되었습니다.');
    showList();
  }
}
function updateCharCount(){ document.getElementById('char-count').textContent=document.getElementById('f-title').value.length; }
function switchView(v){
  ['list','detail','write'].forEach(n=>{ document.getElementById('view-'+n).style.display=n===v?'block':'none'; });
  window.scrollTo({top:0,behavior:'smooth'});
}
function showToast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400); }
function goHome(){ window.location.href='index.html'; }

renderList();
</script>
