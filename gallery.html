<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>갤러리 – 중흥FC</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:#f4f6f8;min-height:100vh;display:flex;flex-direction:column;}
  nav{background:#111827;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;}
  .nav-logo{font-size:20px;font-weight:900;color:#fff;cursor:pointer;display:flex;align-items:center;gap:8px;}
  .badge{background:#1a7f3c;color:#fff;font-size:11px;padding:2px 7px;border-radius:6px;}
  .nav-links{display:flex;gap:18px;list-style:none;}
  .nav-links a{color:#9ca3af;font-size:13px;text-decoration:none;cursor:pointer;}
  .nav-links a:hover{color:#fff;}
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:60px 20px;}
  .icon{font-size:72px;}
  h1{font-size:24px;font-weight:900;color:#111827;}
  p{font-size:15px;color:#6b7280;text-align:center;line-height:1.7;}
  .back-btn{margin-top:8px;padding:12px 28px;background:#1a7f3c;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
  .back-btn:hover{background:#155f2e;}
  footer{background:#111827;color:#6b7280;padding:24px 40px;font-size:13px;text-align:center;}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">⚽ 중흥FC</a>
  <ul class="nav-links">
    <li class="nav-item-drop">
      <a href="intro.html" class="">소개 <span class="nav-arrow">▾</span></a>
      <div class="nav-dropdown">
        <a href="intro.html">팀 소개</a>
        <a href="members.html">회원명단</a>
      </div>
    </li>
    <li><a href="notice.html" class="">공지사항</a></li>
    <li><a href="schedule.html" class="">경기일정</a></li>
    <li><a href="gallery.html" class="nav-active">갤러리<span class="nav-active-badge"></span></a></li>
  </ul>
</nav>
<style>
  nav{position:sticky;top:0;z-index:100;background:#111827;display:flex;align-items:center;justify-content:space-between;flex-wrap:nowrap;gap:16px;padding:0 24px;height:60px;box-shadow:0 2px 12px rgba(0,0,0,.3);}
  .nav-logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:900;color:#fff;text-decoration:none;white-space:nowrap;}
  .nav-links{display:flex;gap:22px;list-style:none;flex-wrap:nowrap;align-items:center;}
  .nav-links li{position:relative;}
  .nav-links a{color:#9ca3af;font-size:14px;font-weight:500;text-decoration:none;white-space:nowrap;transition:color .2s;display:inline-flex;align-items:center;gap:3px;position:relative;}
  .nav-links a:hover{color:#fff;}
  .nav-active{color:#fff!important;}
  .nav-active-badge{display:inline-block;width:28px;height:20px;background:#1a7f3c;border-radius:5px;margin-left:2px;vertical-align:middle;}
  .nav-arrow{font-size:9px;opacity:.6;}
  /* 드롭다운 */
  .nav-dropdown{position:absolute;top:calc(100% + 16px);left:50%;transform:translateX(-50%) translateY(-4px);background:#1f2937;border-radius:10px;padding:6px 0;min-width:120px;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:200;}
  .nav-dropdown::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:#1f2937;border-top:none;}
  .nav-item-drop:hover .nav-dropdown{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
  .nav-dropdown a{display:block;padding:9px 18px;color:#d1d5db;font-size:13px;font-weight:500;white-space:nowrap;text-decoration:none;transition:background .15s,color .15s;}
  .nav-dropdown a:hover{background:#374151;color:#fff;}
</style>
<div class="wrap">
  <div class="icon">📸</div>
  <h1>갤러리 준비 중</h1>
  <p>현재 페이지를 열심히 준비하고 있습니다.<br>조금만 기다려 주세요! 🙏</p>
  <button class="back-btn" onclick="location.href='index.html'">← 홈으로 돌아가기</button>
</div>
<footer>© 2026 중흥FC. All rights reserved.</footer>
</body>
</html>
