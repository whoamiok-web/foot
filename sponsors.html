<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>협찬·제휴 - 중흥FC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--green:#1a7f3c;--green2:#23a852;--dark:#111827;--gray1:#374151;--gray2:#6b7280;--gray3:#d1d5db;--bg:#f4f6f8;--white:#fff;--card-shadow:0 2px 16px rgba(0,0,0,.07);--radius:14px;}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
nav{position:sticky;top:0;z-index:100;background:#111827;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;box-shadow:0 2px 12px rgba(0,0,0,.3);gap:10px;}
.nav-logo{font-size:18px;font-weight:900;color:#fff;text-decoration:none;white-space:nowrap;flex-shrink:0;}
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;background:none;border:none;cursor:pointer;padding:4px;flex-shrink:0;}
.hamburger span{display:block;height:2px;background:#fff;border-radius:2px;transition:all .3s;}
.nav-links{display:flex;gap:2px;list-style:none;flex-wrap:nowrap;align-items:center;}
.nav-links a{color:#9ca3af;font-size:12px;font-weight:500;text-decoration:none;white-space:nowrap;padding:5px 7px;border-radius:6px;transition:color .2s,background .2s;}
.nav-links a:hover,.nav-active{color:#fff!important;background:#1a7f3c!important;}
.nav-arrow{font-size:9px;opacity:.6;}
.nav-item-drop{position:relative;padding-bottom:12px;margin-bottom:-12px;}
.nav-dropdown{position:absolute;top:100%;left:50%;transform:translateX(-50%);background:#1f2937;border-radius:10px;padding:6px 0;min-width:120px;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;visibility:hidden;transition:opacity .15s,visibility .15s;z-index:200;}
.nav-item-drop:hover .nav-dropdown{opacity:1;visibility:visible;}
.nav-dropdown a{display:block;padding:9px 18px;color:#d1d5db;font-size:13px;text-decoration:none;}
.nav-dropdown a:hover{background:#374151!important;color:#fff!important;}
@media(max-width:640px){
  .hamburger{display:flex;}
  .nav-links{display:none;flex-direction:column;align-items:stretch;gap:0;position:absolute;top:60px;left:0;right:0;background:#1f2937;padding:8px 0;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:99;}
  .nav-links.open{display:flex;}
  .nav-links li{width:100%;}
  .nav-links>li>a{display:block;padding:13px 20px;font-size:15px;color:#d1d5db;}
  .nav-links>li>a:hover,.nav-active{background:#1a7f3c!important;color:#fff!important;}
  .nav-item-drop .nav-dropdown{position:static;transform:none;opacity:1;visibility:visible;box-shadow:none;border-radius:0;background:#111827;}
  .nav-dropdown a{padding:12px 20px 12px 40px;font-size:14px;color:#9ca3af;border-left:3px solid #1a7f3c;}
}
.page-header{background:linear-gradient(135deg,#0f2027 0%,#1a4a2e 60%,#203a43 100%);padding:40px 24px 36px;}
.page-header-inner{max-width:960px;margin:0 auto;}
.breadcrumb{font-size:12px;color:#6b7280;margin-bottom:10px;}
.breadcrumb .cur{color:#23a852;font-weight:600;}
.page-header h1{font-size:28px;font-weight:900;color:#fff;}
.page-header p{font-size:14px;color:#9ca3af;margin-top:6px;}
.main-wrap{max-width:960px;margin:0 auto;padding:32px 24px 80px;}
.admin-bar{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:12px 20px;margin-bottom:24px;display:none;align-items:center;gap:12px;flex-wrap:wrap;}
.admin-bar.show{display:flex;}
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.cat-btn{padding:7px 16px;border-radius:8px;border:1.5px solid var(--gray3);background:var(--white);font-size:13px;font-weight:600;color:var(--gray2);cursor:pointer;transition:all .2s;font-family:inherit;}
.cat-btn.active{background:var(--dark);color:#fff;border-color:var(--dark);}
.search-box{display:flex;align-items:center;gap:6px;background:var(--white);border:1.5px solid var(--gray3);border-radius:9px;padding:7px 12px;margin-left:auto;}
.search-box input{border:none;outline:none;font-size:13px;font-family:inherit;color:var(--dark);width:130px;background:transparent;}
.sponsors-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
@media(max-width:900px){.sponsors-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:540px){.sponsors-grid{grid-template-columns:1fr;}}
.sp-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--card-shadow);overflow:hidden;transition:transform .2s,box-shadow .2s;}
.sp-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.12);}
.sp-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:48px;}
.sp-thumb img{width:100%;height:100%;object-fit:cover;}
.sp-body{padding:16px 18px 18px;}
.sp-cat{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;margin-bottom:8px;}
.sp-name{font-size:17px;font-weight:900;margin-bottom:4px;}
.sp-owner{font-size:12px;color:var(--gray2);margin-bottom:10px;}
.sp-desc{font-size:13px;color:var(--gray1);line-height:1.7;margin-bottom:12px;}
.sp-benefit{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);font-weight:700;margin-bottom:12px;}
.sp-links{display:flex;gap:8px;flex-wrap:wrap;}
.sp-link{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;border:1.5px solid var(--gray3);color:var(--gray1);transition:all .2s;}
.sp-link:hover{border-color:var(--green);color:var(--green);}
.sp-link.primary{background:var(--green);color:#fff;border-color:var(--green);}
.sp-admin-btns{display:none;gap:6px;margin-top:10px;}
.sp-admin-btns.show{display:flex;}
.btn-edit{padding:5px 12px;border-radius:6px;border:1.5px solid #fde68a;background:#fffbeb;color:#92400e;font-size:12px;font-weight:600;cursor:pointer;}
.btn-del{padding:5px 12px;border-radius:6px;border:1.5px solid #fca5a5;background:#fef2f2;color:#dc2626;font-size:12px;font-weight:600;cursor:pointer;}
.btn-primary{background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-sm{padding:6px 14px;border-radius:8px;border:1.5px solid var(--gray3);background:var(--white);font-size:13px;font-weight:600;cursor:pointer;color:var(--gray1);}
.empty{text-align:center;padding:80px 20px;color:var(--gray2);font-size:14px;grid-column:1/-1;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:17px;font-weight:800;margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--gray2);margin-bottom:5px;}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 13px;border:1.5px solid var(--gray3);border-radius:8px;font-size:14px;font-family:inherit;outline:none;}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--green);}
.fg textarea{min-height:80px;resize:vertical;line-height:1.6;}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.modal-btns button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;}
.pw-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;align-items:center;justify-content:center;}
.pw-modal.open{display:flex;}
.pw-box{background:#fff;border-radius:16px;padding:28px;width:300px;text-align:center;}
.pw-box h3{font-size:16px;font-weight:800;margin-bottom:16px;}
.pw-input{width:100%;padding:11px 16px;border:1.5px solid var(--gray3);border-radius:9px;font-size:15px;font-family:inherit;outline:none;text-align:center;letter-spacing:4px;margin-bottom:8px;}
.pw-err{font-size:12px;color:#dc2626;margin-bottom:10px;min-height:16px;}
.pw-btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:#1f2937;color:#fff;font-size:14px;font-weight:600;padding:12px 24px;border-radius:12px;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{width:24px;height:24px;border:3px solid #e5e7eb;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:60px auto;}
</style>
</head>

    onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='.4'">⚙️</button>

    <div class="pw-err" id="pw-err"></div>
    <button class="pw-btn" onclick="checkPw()">확인</button>

</div>

<div id="toast"></div>

<div style="background:#111827;margin-top:48px;">
  <div style="max-width:960px;margin:0 auto;padding:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <div style="color:#6b7280;font-size:13px;">
      <a href="index.html" style="font-size:16px;font-weight:900;color:#fff;text-decoration:none;display:block;margin-bottom:4px;">⚽ 중흥FC</a>

    </div>

<script>
var DB = 'https://joonghung-9a14c-default-rtdb.asia-southeast1.firebasedatabase.app';
var ADMIN_PW = 'joonghung2015';
var ADMIN_KEY = 'sp_admin_v2';
var CAT_LABELS = {food:'🍽️ 음식', beauty:'💇 미용·뷰티', health:'💪 건강·스포츠', etc:'🏪 기타'};
var allSponsors = [];
var curCat = 'all';
var editId = null;
var isAdmin = false;

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function loadSponsors() {
  fetch(DB + '/sponsors.json')
    .then(function(r){ return r.json(); })
    .then(function(data){
      allSponsors = [];
      if (data && typeof data === 'object') {
        Object.entries(data).forEach(function(entry){
          if (entry[1]) allSponsors.push(Object.assign({id: entry[0]}, entry[1]));
        });
      }
      allSponsors.sort(function(a,b){ return (a.name||'').localeCompare(b.name||'','ko'); });
      renderSponsors();
    })
    .catch(function(){ renderSponsors(); });
}

function filterCat(cat, btn) {
  curCat = cat;
  document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderSponsors();
}

function driveThumb(url) {
  if (!url) return '';
  // /file/d/ID/view 형태
  var m = url.match(/[\/=]([A-Za-z0-9_-]{25,})/);
  if (m) return 'https://lh3.googleusercontent.com/d/' + m[1] + '=w400';
  return url;
}

function renderSponsors() {
  var grid = document.getElementById('sponsors-grid');
  var kw = document.getElementById('search-input').value.trim().toLowerCase();
  var list = allSponsors.filter(function(s){
    return (curCat === 'all' || s.category === curCat) &&
      (!kw || (s.name||'').toLowerCase().includes(kw) || (s.desc||'').toLowerCase().includes(kw));
  });

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty">등록된 가게가 없습니다.</div>';
    return;
  }

  var catColors = {
    food: 'background:#fff7ed;color:#c2410c;border:1px solid #fed7aa',
    beauty: 'background:#fdf4ff;color:#7e22ce;border:1px solid #e9d5ff',
    health: 'background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0',
    etc: 'background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe'
  };

  grid.innerHTML = list.map(function(s){
    var catStyle = catColors[s.category] || catColors.etc;
    var imgHTML = s.img
      ? '<div class="sp-thumb"><img src="' + driveThumb(s.img) + '" loading="lazy" onerror="this.onerror=null;this.parentElement.innerHTML='<span style=&quot;font-size:48px;&quot;>🏪</span>'"></div>'
      : '<div class="sp-thumb"><span>🏪</span></div>';
    var benefitHTML = s.benefit
      ? '<div class="sp-benefit">🎁 회원 혜택 — <span style="font-weight:400;color:#374151;">' + s.benefit + '</span></div>' : '';
    var links = [];
    if (s.tel) links.push('<a class="sp-link" href="tel:' + s.tel + '">📞 전화</a>');
    if (s.map) links.push('<a class="sp-link" href="' + s.map + '" target="_blank">🗺️ 지도</a>');
    if (s.url) links.push('<a class="sp-link primary" href="' + s.url + '" target="_blank">🔗 방문</a>');
    var adminBtns = isAdmin
      ? '<div class="sp-admin-btns show"><button class="btn-edit" onclick="openModal('' + s.id + '')">수정</button><button class="btn-del" onclick="delSponsor('' + s.id + '')">삭제</button></div>' : '';
    return '<div class="sp-card">' + imgHTML +
      '<div class="sp-body">' +
      '<div class="sp-cat" style="' + catStyle + '">' + (CAT_LABELS[s.category]||'기타') + '</div>' +
      '<div class="sp-name">' + (s.name||'') + '</div>' +
      '<div class="sp-owner">' + (s.owner ? '👤 ' + s.owner : '') + (s.addr ? (s.owner?' · ':'') + '📍 ' + s.addr : '') + '</div>' +
      '<div class="sp-desc">' + (s.desc||'') + '</div>' +
      benefitHTML +
      '<div class="sp-links">' + links.join('') + '</div>' +
      adminBtns +
      '</div></div>';
  }).join('');
}

function openPw() {
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-err').textContent = '';
  document.getElementById('pw-modal').classList.add('open');
  setTimeout(function(){ document.getElementById('pw-input').focus(); }, 100);
}

function checkPw() {
  var val = document.getElementById('pw-input').value;
  if (val === ADMIN_PW) {
    isAdmin = true;
    sessionStorage.setItem(ADMIN_KEY, '1');
    document.getElementById('pw-modal').classList.remove('open');
    document.getElementById('admin-bar').classList.add('show');
    renderSponsors();
    showToast('✅ 총무 모드 활성화');
  } else {
    document.getElementById('pw-err').textContent = '❌ 비밀번호가 틀렸습니다.';
    document.getElementById('pw-input').value = '';
  }
}

function exitAdmin() {
  isAdmin = false;
  sessionStorage.removeItem(ADMIN_KEY);
  document.getElementById('admin-bar').classList.remove('show');
  renderSponsors();
  showToast('관리 모드 종료');
}

function openModal(id) {
  editId = id;
  var s = id ? allSponsors.find(function(x){ return x.id === id; }) : null;
  document.getElementById('modal-title').textContent = id ? '✏️ 가게 수정' : '🏪 가게 추가';
  document.getElementById('f-name').value    = s && s.name    || '';
  document.getElementById('f-cat').value     = s && s.category || 'food';
  document.getElementById('f-owner').value   = s && s.owner   || '';
  document.getElementById('f-addr').value    = s && s.addr    || '';
  document.getElementById('f-tel').value     = s && s.tel     || '';
  document.getElementById('f-desc').value    = s && s.desc    || '';
  document.getElementById('f-benefit').value = s && s.benefit || '';
  document.getElementById('f-img').value     = s && s.img     || '';
  document.getElementById('f-map').value     = s && s.map     || '';
  document.getElementById('f-url').value     = s && s.url     || '';
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  editId = null;
}

function saveSponsor() {
  var name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('⚠️ 가게명을 입력해 주세요.'); return; }
  var data = {
    name: name,
    category: document.getElementById('f-cat').value,
    owner:   document.getElementById('f-owner').value.trim(),
    addr:    document.getElementById('f-addr').value.trim(),
    tel:     document.getElementById('f-tel').value.trim(),
    desc:    document.getElementById('f-desc').value.trim(),
    benefit: document.getElementById('f-benefit').value.trim(),
    img:     document.getElementById('f-img').value.trim(),
    map:     document.getElementById('f-map').value.trim(),
    url:     document.getElementById('f-url').value.trim(),
    updatedAt: Date.now()
  };
  var H = {'Content-Type':'application/json'};
  if (editId) {
    fetch(DB + '/sponsors/' + editId + '.json', {method:'PATCH', headers:H, body:JSON.stringify(data)})
      .then(function(){
        var i = allSponsors.findIndex(function(x){ return x.id === editId; });
        if (i > -1) allSponsors[i] = Object.assign({}, allSponsors[i], data);
        closeModal(); renderSponsors(); showToast('✅ 수정 완료!');
      });
  } else {
    data.createdAt = Date.now();
    fetch(DB + '/sponsors.json', {method:'POST', headers:H, body:JSON.stringify(data)})
      .then(function(r){ return r.json(); })
      .then(function(res){
        allSponsors.push(Object.assign({id: res.name}, data));
        closeModal(); renderSponsors(); showToast('✅ 등록 완료!');
      });
  }
}

function delSponsor(id) {
  if (!confirm('이 가게를 삭제하시겠습니까?')) return;
  fetch(DB + '/sponsors/' + id + '.json', {method:'DELETE'})
    .then(function(){
      allSponsors = allSponsors.filter(function(x){ return x.id !== id; });
      renderSponsors(); showToast('✅ 삭제 완료!');
    });
}

if (sessionStorage.getItem(ADMIN_KEY)) {
  isAdmin = true;
  document.getElementById('admin-bar').classList.add('show');
}

loadSponsors();
</script>
</body>
</html>
