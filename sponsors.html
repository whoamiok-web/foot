<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원 가게 - 중흥FC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--green:#1a7f3c;--dark:#111827;--gray2:#6b7280;--gray3:#d1d5db;--bg:#f4f6f8;--white:#fff;--radius:14px;}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
nav{position:sticky;top:0;z-index:100;background:#111827;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;box-shadow:0 2px 12px rgba(0,0,0,.3);gap:10px;}
.nav-logo{font-size:18px;font-weight:900;color:#fff;text-decoration:none;white-space:nowrap;}
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;background:none;border:none;cursor:pointer;padding:4px;}
.hamburger span{display:block;height:2px;background:#fff;border-radius:2px;}
.nav-links{display:flex;gap:2px;list-style:none;align-items:center;}
.nav-links a{color:#9ca3af;font-size:12px;font-weight:500;text-decoration:none;padding:5px 7px;border-radius:6px;white-space:nowrap;}
.nav-links a:hover,.nav-active{color:#fff!important;background:#1a7f3c!important;}
.nav-item-drop{position:relative;padding-bottom:12px;margin-bottom:-12px;}
.nav-dropdown{position:absolute;top:100%;left:50%;transform:translateX(-50%);background:#1f2937;border-radius:10px;padding:6px 0;min-width:120px;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;visibility:hidden;transition:opacity .15s,visibility .15s;z-index:200;}
.nav-item-drop.open .nav-dropdown{opacity:1;visibility:visible;}
.nav-dropdown a{display:block;padding:9px 18px;color:#d1d5db;font-size:13px;text-decoration:none;}
.nav-dropdown a:hover{background:#374151!important;color:#fff!important;}
@media(max-width:640px){
  .hamburger{display:flex;}
  .nav-links{display:none;flex-direction:column;align-items:stretch;gap:0;position:absolute;top:60px;left:0;right:0;background:#1f2937;padding:8px 0;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:99;}
  .nav-links.open{display:flex;}
  .nav-links li{width:100%;}
  .nav-links > li > a{display:block;padding:13px 20px;font-size:15px;color:#d1d5db;}
  .nav-links > li > a:hover,.nav-active{background:#1a7f3c!important;color:#fff!important;}
  .nav-item-drop .nav-dropdown{position:static;transform:none;opacity:1;visibility:visible;box-shadow:none;border-radius:0;background:#111827;}
  .nav-dropdown a{padding:12px 20px 12px 40px;font-size:14px;color:#9ca3af;border-left:3px solid #1a7f3c;}
}
.page-header{background:linear-gradient(135deg,#0f2027 0%,#1a4a2e 60%,#203a43 100%);padding:40px 24px 36px;}
.page-header-inner{max-width:960px;margin:0 auto;}
.breadcrumb{font-size:12px;color:#6b7280;margin-bottom:10px;}
.breadcrumb .cur{color:#23a852;font-weight:600;}
.page-header h1{font-size:28px;font-weight:900;color:#fff;}
.page-header p{font-size:14px;color:#9ca3af;margin-top:6px;}
.main-wrap{max-width:960px;margin:0 auto;padding:32px 24px 80px;}
.admin-bar{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:12px 20px;margin-bottom:24px;display:none;align-items:center;gap:12px;flex-wrap:wrap;}
.admin-bar.show{display:flex;}
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.cat-btn{padding:7px 16px;border-radius:8px;border:1.5px solid var(--gray3);background:var(--white);font-size:13px;font-weight:600;color:var(--gray2);cursor:pointer;font-family:inherit;}
.cat-btn.active{background:var(--dark);color:#fff;border-color:var(--dark);}
.search-box{display:flex;align-items:center;gap:6px;background:var(--white);border:1.5px solid var(--gray3);border-radius:9px;padding:7px 12px;margin-left:auto;}
.search-box input{border:none;outline:none;font-size:13px;font-family:inherit;color:var(--dark);width:130px;background:transparent;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:540px){.grid{grid-template-columns:1fr;}}
.card{background:var(--white);border-radius:var(--radius);box-shadow:0 2px 16px rgba(0,0,0,.07);overflow:hidden;}
.card-img{width:100%;aspect-ratio:4/3;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:48px;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;}
.card-body{padding:16px 18px 18px;}
.card-cat{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;margin-bottom:8px;}
.card-name{font-size:17px;font-weight:900;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--gray2);margin-bottom:10px;}
.card-desc{font-size:13px;color:#374151;line-height:1.7;margin-bottom:12px;}
.card-benefit{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);font-weight:700;margin-bottom:12px;}
.card-links{display:flex;gap:8px;flex-wrap:wrap;}
.lnk{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;border:1.5px solid var(--gray3);color:#374151;}
.lnk.main{background:var(--green);color:#fff;border-color:var(--green);}
.adm-btns{display:none;gap:6px;margin-top:10px;}
.adm-btns.on{display:flex;}
.btn-e{padding:5px 12px;border-radius:6px;border:1.5px solid #fde68a;background:#fffbeb;color:#92400e;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-d{padding:5px 12px;border-radius:6px;border:1.5px solid #fca5a5;background:#fef2f2;color:#dc2626;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-g{background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-s{padding:6px 14px;border-radius:8px;border:1.5px solid var(--gray3);background:var(--white);font-size:13px;font-weight:600;cursor:pointer;color:#374151;font-family:inherit;}
.empty{text-align:center;padding:80px 20px;color:var(--gray2);font-size:14px;grid-column:1/-1;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:17px;font-weight:800;margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--gray2);margin-bottom:5px;}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 13px;border:1.5px solid var(--gray3);border-radius:8px;font-size:14px;font-family:inherit;outline:none;}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--green);}
.fg textarea{min-height:80px;resize:vertical;line-height:1.6;}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.modal-btns button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;}
.pw-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;align-items:center;justify-content:center;}
.pw-modal.open{display:flex;}
.pw-box{background:#fff;border-radius:16px;padding:28px;width:300px;text-align:center;}
.pw-box h3{font-size:16px;font-weight:800;margin-bottom:16px;}
.pw-inp{width:100%;padding:11px 16px;border:1.5px solid var(--gray3);border-radius:9px;font-size:15px;font-family:inherit;outline:none;text-align:center;margin-bottom:8px;}
.pw-err{font-size:12px;color:#dc2626;margin-bottom:10px;min-height:16px;}
.pw-btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:#1f2937;color:#fff;font-size:14px;font-weight:600;padding:12px 24px;border-radius:12px;z-index:9999;transition:transform .3s;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

<script>
(function(){
  var hm = document.getElementById('hamburger');
  var nl = document.getElementById('nav-links');
  hm.addEventListener('click', function(){ nl.classList.toggle('open'); });
  nl.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click', function(){ nl.classList.remove('open'); });
  });
})();
// 소개 드롭다운 클릭 토글
document.querySelectorAll('.nav-item-drop').forEach(function(drop){
  var toggle = drop.querySelector('a');
  if(!toggle) return;
  toggle.addEventListener('click',function(e){
    e.preventDefault();
    var isOpen = drop.classList.contains('open');
    document.querySelectorAll('.nav-item-drop').forEach(function(d){ d.classList.remove('open'); });
    if(!isOpen) drop.classList.add('open');
  });
});
document.addEventListener('click',function(e){
  if(!e.target.closest('.nav-item-drop')){
    document.querySelectorAll('.nav-item-drop').forEach(function(d){ d.classList.remove('open'); });
  }
});
</script>

<div class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb"><a href="index.html" style="color:#6b7280;text-decoration:none;">홈</a> &rsaquo; <span class="cur">회원 가게</span></div>

<div style="background:#111827;margin-top:48px;">
  <div style="max-width:960px;margin:0 auto;padding:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <div style="color:#6b7280;font-size:13px;">
      <a href="index.html" style="font-size:16px;font-weight:900;color:#fff;text-decoration:none;display:block;margin-bottom:4px;">&#9917; 중흥FC</a>
      <div>광주광역시 북구 중흥동 | 매주 일요일 AM 06:30</div>

  </div>
</div>

<script>
(function(){
  var DB = 'https://joonghung-9a14c-default-rtdb.asia-southeast1.firebasedatabase.app';
  var PW = 'joonghung2015';
  var SK = 'sp_adm3';
  var CATS = {food:'🍽️ 음식', beauty:'💇 미용·뷰티', health:'💪 건강·스포츠', etc:'🏪 기타'};
  var CC = {
    food:'background:#fff7ed;color:#c2410c;border:1px solid #fed7aa',
    beauty:'background:#fdf4ff;color:#7e22ce;border:1px solid #e9d5ff',
    health:'background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0',
    etc:'background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe'
  };
  var items = [];
  var curCat = 'all';
  var admin = false;
  var editId = null;

  function toast(msg){
    var t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');},2200);
  }

  function imgId(url){
    if(!url) return '';
    var m=url.match(/\/d\/([A-Za-z0-9_\-]+)/);
    return m ? m[1] : '';
  }

  function render(){
    var kw=document.getElementById('srch').value.trim().toLowerCase();
    var list=items.filter(function(s){
      return (curCat==='all'||s.category===curCat)&&(!kw||(s.name||'').toLowerCase().indexOf(kw)>=0||(s.desc||'').toLowerCase().indexOf(kw)>=0);
    });
    var g=document.getElementById('grid');
    if(!list.length){g.innerHTML='<div class="empty">등록된 가게가 없습니다.</div>';return;}
    g.innerHTML=list.map(function(s){
      var id=imgId(s.img);
      var imgH=id
        ? '<div class="card-img"><img src="https://drive.google.com/thumbnail?id='+id+'&sz=w400" alt="" onerror="this.style.display=\'none\'"></div>'
        : '<div class="card-img">🏪</div>';
      var ben=s.benefit?'<div class="card-benefit">🎁 회원 혜택 &mdash; <span style="font-weight:400;color:#374151;">'+s.benefit+'</span></div>':'';
      var lnks='';
      if(s.tel) lnks+='<a class="lnk" href="tel:'+s.tel+'">📞 전화</a>';
      if(s.map) lnks+='<a class="lnk" href="'+s.map+'" target="_blank" rel="noopener">🗺️ 지도</a>';
      if(s.url) lnks+='<a class="lnk main" href="'+s.url+'" target="_blank" rel="noopener">🔗 방문</a>';
      var abtns=admin?'<div class="adm-btns on"><button class="btn-e" data-eid="'+s.id+'">수정</button><button class="btn-d" data-did="'+s.id+'">삭제</button></div>':'';
      return '<div class="card">'+imgH+'<div class="card-body"><div class="card-cat" style="'+( CC[s.category]||CC.etc)+'">'+( CATS[s.category]||'기타')+'</div><div class="card-name">'+(s.name||'')+'</div><div class="card-sub">'+(s.owner?'👤 '+s.owner:'')+(s.addr?(s.owner?' · ':'')+'📍 '+s.addr:'')+'</div><div class="card-desc">'+(s.desc||'')+'</div>'+ben+'<div class="card-links">'+lnks+'</div>'+abtns+'</div></div>';
    }).join('');
    g.querySelectorAll('[data-eid]').forEach(function(b){
      b.addEventListener('click',function(){openForm(b.getAttribute('data-eid'));});
    });
    g.querySelectorAll('[data-did]').forEach(function(b){
      b.addEventListener('click',function(){del(b.getAttribute('data-did'));});
    });
  }

  function load(){
    fetch(DB+'/sponsors.json')
      .then(function(r){return r.json();})
      .then(function(d){
        items=[];
        if(d&&typeof d==='object'){
          Object.keys(d).forEach(function(k){if(d[k])items.push(Object.assign({id:k},d[k]));});
        }
        items.sort(function(a,b){return(a.name||'').localeCompare(b.name||'','ko');});
        render();
      })
      .catch(function(){render();});
  }

  document.querySelectorAll('.cat-btn').forEach(function(b){
    b.addEventListener('click',function(){
      curCat=b.getAttribute('data-cat');
      document.querySelectorAll('.cat-btn').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      render();
    });
  });
  document.getElementById('srch').addEventListener('input',render);

  // 총무 버튼
  document.getElementById('pw-btn').addEventListener('click',function(){
    document.getElementById('pw-inp').value='';
    document.getElementById('pw-err').textContent='';
    document.getElementById('m-pw').classList.add('open');
    setTimeout(function(){document.getElementById('pw-inp').focus();},100);
  });
  document.getElementById('pw-ok').addEventListener('click',checkPw);
  document.getElementById('pw-inp').addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();});

  function checkPw(){
    if(document.getElementById('pw-inp').value===PW){
      admin=true; sessionStorage.setItem(SK,'1');
      document.getElementById('m-pw').classList.remove('open');
      document.getElementById('admin-bar').classList.add('show');
      render(); toast('✅ 총무 모드 활성화');
    } else {
      document.getElementById('pw-err').textContent='❌ 비밀번호가 틀렸습니다.';
      document.getElementById('pw-inp').value='';
    }
  }

  document.getElementById('btn-exit').addEventListener('click',function(){
    admin=false; sessionStorage.removeItem(SK);
    document.getElementById('admin-bar').classList.remove('show');
    render(); toast('관리 모드 종료');
  });

  document.getElementById('btn-add').addEventListener('click',function(){openForm(null);});
  document.getElementById('m-cancel').addEventListener('click',closeForm);
  document.getElementById('m-save').addEventListener('click',save);

  function openForm(id){
    editId=id;
    var s=id?items.find(function(x){return x.id===id;}):null;
    document.getElementById('m-title').textContent=id?'✏️ 가게 수정':'🏪 가게 추가';
    document.getElementById('f-name').value=s&&s.name||'';
    document.getElementById('f-cat').value=s&&s.category||'food';
    document.getElementById('f-owner').value=s&&s.owner||'';
    document.getElementById('f-addr').value=s&&s.addr||'';
    document.getElementById('f-tel').value=s&&s.tel||'';
    document.getElementById('f-desc').value=s&&s.desc||'';
    document.getElementById('f-benefit').value=s&&s.benefit||'';
    document.getElementById('f-img').value=s&&s.img||'';
    document.getElementById('f-map').value=s&&s.map||'';
    document.getElementById('f-url').value=s&&s.url||'';
    document.getElementById('m-form').classList.add('open');
  }

  function closeForm(){document.getElementById('m-form').classList.remove('open');editId=null;}

  function save(){
    var name=document.getElementById('f-name').value.trim();
    if(!name){toast('⚠️ 가게명을 입력해 주세요.');return;}
    var data={
      name:name,
      category:document.getElementById('f-cat').value,
      owner:document.getElementById('f-owner').value.trim(),
      addr:document.getElementById('f-addr').value.trim(),
      tel:document.getElementById('f-tel').value.trim(),
      desc:document.getElementById('f-desc').value.trim(),
      benefit:document.getElementById('f-benefit').value.trim(),
      img:document.getElementById('f-img').value.trim(),
      map:document.getElementById('f-map').value.trim(),
      url:document.getElementById('f-url').value.trim(),
      updatedAt:Date.now()
    };
    var H={'Content-Type':'application/json'};
    if(editId){
      fetch(DB+'/sponsors/'+editId+'.json',{method:'PATCH',headers:H,body:JSON.stringify(data)})
        .then(function(){
          var i=items.findIndex(function(x){return x.id===editId;});
          if(i>-1)items[i]=Object.assign({},items[i],data);
          closeForm();render();toast('✅ 수정 완료!');
        });
    } else {
      data.createdAt=Date.now();
      fetch(DB+'/sponsors.json',{method:'POST',headers:H,body:JSON.stringify(data)})
        .then(function(r){return r.json();})
        .then(function(res){
          items.push(Object.assign({id:res.name},data));
          closeForm();render();toast('✅ 등록 완료!');
        });
    }
  }

  function del(id){
    if(!confirm('이 가게를 삭제하시겠습니까?'))return;
    fetch(DB+'/sponsors/'+id+'.json',{method:'DELETE'})
      .then(function(){
        items=items.filter(function(x){return x.id!==id;});
        render();toast('✅ 삭제 완료!');
      });
  }

  if(sessionStorage.getItem(SK)){
    admin=true;
    document.getElementById('admin-bar').classList.add('show');
  }

  load();
})();
</script>
</body>
</html>
